<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Beautiful dark background squircle/circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-gradient)" />
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Bus Red Body Gradient -->
    <linearGradient id="bus-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E11D48" />
      <stop offset="100%" stop-color="#9F1239" />
    </linearGradient>

    <!-- Glowing LED Board Gradient -->
    <linearGradient id="led-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Shadow under the bus -->
  <ellipse cx="256" cy="440" rx="130" ry="16" fill="#000000" opacity="0.6" />

  <!-- Tires -->
  <rect x="156" y="410" width="44" height="30" rx="10" fill="#1E293B" />
  <rect x="312" y="410" width="44" height="30" rx="10" fill="#1E293B" />

  <!-- Bus Main Body -->
  <rect x="136" y="90" width="240" height="330" rx="36" fill="url(#bus-red)" stroke="#4C0519" stroke-width="6" />

  <!-- Roof Trim / Cap (Classic Silver/Black) -->
  <path d="M156 90 h200 c15 0 20 10 20 20 v10 H136 v-10 c0-10 5-20 20-20 z" fill="#334155" />

  <!-- Upper Deck Window -->
  <rect x="152" y="130" width="208" height="95" rx="16" fill="#0F172A" stroke="#4C0519" stroke-width="4" />
  <!-- Upper Deck Glass Reflection -->
  <path d="M158 134 L280 134 L210 220 L158 220 Z" fill="#FFFFFF" opacity="0.15" />
  <rect x="252" y="130" width="8" height="95" fill="#334155" /> <!-- Center window divider -->

  <!-- Destination LED Board Panel -->
  <rect x="176" y="240" width="160" height="42" rx="10" fill="#1E293B" stroke="#4C0519" stroke-width="4" />
  <rect x="182" y="245" width="148" height="32" rx="6" fill="#020617" />
  
  <!-- Glowing LED Route Text -->
  <text x="210" y="267" font-family="monospace, Courier, sans-serif" font-weight="900" font-size="18" fill="url(#led-glow)" letter-spacing="1">HK BUS</text>
  <!-- Glowing LED clock/dot details on the side -->
  <circle cx="310" cy="261" r="3" fill="#D97706" />

  <!-- Lower Deck Window -->
  <rect x="152" y="295" width="208" height="85" rx="16" fill="#0F172A" stroke="#4C0519" stroke-width="4" />
  <!-- Lower Deck Glass Reflection -->
  <path d="M158 299 L280 299 L220 375 L158 375 Z" fill="#FFFFFF" opacity="0.15" />
  <rect x="252" y="295" width="8" height="85" fill="#334155" /> <!-- Center window divider -->

  <!-- Front Headlights / Lights -->
  <circle cx="170" cy="396" r="14" fill="#FEE2E2" stroke="#9F1239" stroke-width="3" />
  <circle cx="170" cy="396" r="8" fill="#FBBF24" />

  <circle cx="342" cy="396" r="14" fill="#FEE2E2" stroke="#9F1239" stroke-width="3" />
  <circle cx="342" cy="396" r="8" fill="#FBBF24" />

  <!-- License Plate -->
  <rect x="216" y="396" width="80" height="18" rx="4" fill="#FBBF24" stroke="#1E293B" stroke-width="2" />
  <text x="256" y="410" font-family="sans-serif" font-weight="bold" font-size="11" fill="#000000" text-anchor="middle" letter-spacing="0.5">ETA-2026</text>

  <!-- Decorative grill pattern under headlights -->
  <line x1="230" y1="388" x2="282" y2="388" stroke="#334155" stroke-width="3" stroke-linecap="round" />
  <line x1="235" y1="392" x2="277" y2="392" stroke="#334155" stroke-width="3" stroke-linecap="round" />
</svg>